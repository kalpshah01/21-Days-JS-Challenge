<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery with Modal</title>
<style>
  body { 
    font-family: Arial, sans-serif; 
    margin: 0; 
    padding: 20px; 
    background-color: #f4f4f4; 
  }

  .gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  .gallery img {
    width: calc(33.333% - 10px);
    max-width: 400px;
    height: auto;
    cursor: pointer;
    border-radius: 8px;
    transition: transform 0.3s;
  }

  .gallery img:hover {
    transform: scale(1.05);
  }

  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  .modal-content {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 90%;
    max-height: 90%;
    text-align: center;
    position: relative;
  }

  .modal-content img {
    max-width: 70%;
    max-height: 70%;
    border-radius: 8px;
  }

  .close {
    position: absolute;
    top: 10px;
    right: 15px;
    color: #aaa;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
  }

  .close:hover {
    color: black;
  }

  /* Responsive adjustments */
  @media (max-width: 768px) {
    .gallery img {
      width: calc(50% - 10px);
    }
  }

  @media (max-width: 480px) {
    .gallery img {
      width: 100%;
    }
  }
</style>
</head>
<body>

<h2>Image Gallery</h2>
<div class="gallery">
  <img src="image1.png" alt="Image 1" onclick="openModal(this.src)">
  <img src="image2.png" alt="Image 2" onclick="openModal(this.src)">
  <img src="image3.png" alt="Image 3" onclick="openModal(this.src)">
  <img src="image4.png" alt="Image 4" onclick="openModal(this.src)">
  <img src="image5.png" alt="Image 5" onclick="openModal(this.src)">
  <img src="image6.png" alt="Image 6" onclick="openModal(this.src)">
  <img src="image7.png" alt="Image 7" onclick="openModal(this.src)">
  <img src="image8.png" alt="Image 8" onclick="openModal(this.src)">
  <img src="image9.png" alt="Image 9" onclick="openModal(this.src)">
  <img src="image10.png" alt="Image 10" onclick="openModal(this.src)">
  <img src="image11.png" alt="Image 11" onclick="openModal(this.src)">
  <img src="image12.png" alt="Image 12" onclick="openModal(this.src)">
  <img src="image13.png" alt="Image 13" onclick="openModal(this.src)">
  <img src="image14.png" alt="Image 14" onclick="openModal(this.src)">
  <img src="image15.png" alt="Image 15" onclick="openModal(this.src)">

</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <img id="modalImage" src="" alt="Modal Image">
  </div>
</div>

<script>
function openModal(src) {
  document.getElementById("modalImage").src = src;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// Close modal when clicking outside
window.onclick = function(event) {
  if (event.target == document.getElementById("modal")) {
    closeModal();
  }
}
</script>
</body>
</html>



</body>
</html>
