<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Management</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="header">
        <button id="btn">☰</button>
        <div class="img">
          <img src="logo.png" alt="Logo" />
        </div>

        <ul class="desktop-nav">
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
          <li><a href="#">Register</a></li>
        </ul>
      </div>
    </nav>

    <div class="mobile-nav" id="mobilenav">
      <button id="closeBtn">✖</button>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
      <a href="#">Register</a>
    </div>
    <h1 class="text-center">Event Management</h1>
    <form>
      <label for="ename">Event Name</label>
      <input type="text" id="ename" required />
      <br /><br />
      <label for="evenue">Event Venue</label>
      <input type="text" id="evenue" required />
      <br />
      <br />
      <label for="edate">Event Date</label>
      <input type="date" id="edate" required />
      <br /><br />
      <button id="insert">Add</button>
    </form>
    <br /><br />
    <table border="2px" width="600px">
      <thead>
        <tr>
          <th>Event no</th>
          <th>Event Name</th>
          <th>Event Venue</th>
          <th>Event Date</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="eventbody"></tbody>
    </table>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./index.js"></script>
  </body>
</html>
