<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
     <nav>
      <div class="header">
        <button id="btn">☰</button>
        <div class="img">
          <img src="logo.png" alt="Logo" />
        </div>

        <ul class="desktop-nav">
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
          <li><a href="#">Register</a></li>
        </ul>
      </div>
    </nav>

    <div class="mobile-nav" id="mobilenav">
      <button id="closeBtn">✖</button>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
      <a href="#">Register</a>
    </div>

    <div class="container">
        <h1>Signup Form</h1>
        <form id="signupForm" >
            <div>
                <label for="name">Name</label>
                <input type="text" id="name" name="name">
                <div id="nameError" class="error"></div>
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
                <div id="emailError" class="error"></div>
            </div>
            <div>
                <label for="city">City</label>
                <input type="text" id="city" name="city">
                <div id="cityError" class="error"></div>
            </div>
            <div>
                <label for="contactno">Contact No</label>
                <input type="text" id="contactno" name="contactno" maxlength="10">
                <div id="cnoError" class="error"></div>
            </div>
            <div>
                <label>Gender</label>
                <div class="radio-group">
                    <label><input type="radio" id="male" name="gender" value="male"> Male</label>
                    <label><input type="radio" id="female" name="gender" value="female"> Female</label>
                </div>
                <div id="genderError" class="error"></div>
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password">
                <div id="passError" class="error"></div>
            </div>
            <input type="submit" value="Signup" id="signupbtn">
            <div id="formSuccess" class="success"></div>
        </form>
    </div>
    <div class="show">
        <a href="login.html">Already have an account? Login here.</a>
    </div>
   <script src="index.js"></script>
</body>
</html>
